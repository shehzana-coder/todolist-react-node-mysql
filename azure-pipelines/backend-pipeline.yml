trigger:
  branches:
    include:
      - main
      - develop
  paths:
    include:
      - server/**

variables:
  - group: taskapp-variables
  - name: imageTag
    value: $(Build.BuildId)

stages:
  - stage: Build
    displayName: Build and Push Backend Image
    jobs:
      - job: BuildJob
        pool:
          vmImage: ubuntu-latest
        steps:
          - checkout: self

          - task: Docker@2
            displayName: Login to ACR
            inputs:
              command: login
              containerRegistry: acr-service-connection

          - task: Docker@2
            displayName: Build Backend Image
            inputs:
              command: build
              repository: $(BACKEND_IMAGE_NAME)
              dockerfile: server/Dockerfile
              buildContext: server/
              tags: |
                $(imageTag)
                latest

          - task: Docker@2
            displayName: Push Backend Image
            inputs:
              command: push
              repository: $(BACKEND_IMAGE_NAME)
              tags: |
                $(imageTag)
                latest

  - stage: DeployProd
    displayName: Deploy Backend to Production
    dependsOn: Build
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
    jobs:
      - deployment: DeployProdJob
        environment: production
        pool:
          vmImage: ubuntu-latest
        strategy:
          runOnce:
            deploy:
              steps:
                - task: AzureWebAppContainer@1
                  displayName: Deploy Backend Container
                  inputs:
                    azureSubscription: $(AZURE_SUBSCRIPTION)
                    appName: $(BACKEND_APP_NAME)
                    containers: $(DOCKER_REGISTRY)/$(BACKEND_IMAGE_NAME):$(imageTag)